<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal do Cliente — SAAE Nova Mutum</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #0488CA;
    --primary-hover: #0369A1;
    --green-bg: #0B2413;
    --green-light: #184725;
    --surface: rgba(255, 255, 255, 0.96);
    --surface-hover: #FFFFFF;
  }
  
  body { 
    background-color: var(--green-bg);
    background-image: 
      radial-gradient(circle at 15% 50%, rgba(124, 176, 19, 0.15), transparent 35%),
      radial-gradient(circle at 85% 30%, rgba(4, 136, 202, 0.15), transparent 35%);
    min-height: 100vh;
    color: #0F172A; 
    font-family: 'Plus Jakarta Sans', sans-serif; 
    margin: 0;
    padding: 0;
    overflow-x: hidden;
  }

  /* Animated background accent */
  .bg-accent {
    position: fixed;
    top: -50%;
    left: -10%;
    width: 120%;
    height: 120%;
    background: radial-gradient(circle, rgba(24, 71, 37, 0.6) 0%, transparent 60%);
    z-index: -1;
    animation: pulse 12s ease-in-out infinite alternate;
  }

  @keyframes pulse {
    0% { transform: scale(1) translate(0, 0); opacity: 0.4; }
    100% { transform: scale(1.05) translate(2%, 2%); opacity: 0.7; }
  }

  .portal-header {
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    padding: 18px 40px;
    border-bottom: 1px solid rgba(255,255,255,0.4);
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
  }

  .logo-icon {
    width: 50px;
    height: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  
  .logo-icon:hover {
    transform: scale(1.08) rotate(-4deg);
  }

  .logo-icon img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.08));
  }

  .portal-title {
    display: flex;
    flex-direction: column;
  }
  .portal-title h1 {
    margin: 0;
    font-size: 1.35rem;
    font-weight: 800;
    font-family: 'Syne', sans-serif;
    color: #0F172A;
    letter-spacing: -0.02em;
  }
  .portal-title span {
    font-size: 0.75rem;
    font-weight: 600;
    color: #64748B;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .container {
    max-width: 1200px;
    margin: 60px auto 100px;
    padding: 0 24px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 32px;
  }

  .section-card {
    background: var(--surface);
    padding: 36px;
    border-radius: 24px;
    box-shadow: 
      0 20px 40px rgba(0,0,0,0.3),
      inset 0 1px 0 rgba(255,255,255,1);
    border-top: 5px solid var(--primary);
    backdrop-filter: blur(10px);
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.4s ease;
    position: relative;
    overflow: hidden;
  }
  
  .section-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, transparent 100%);
    pointer-events: none;
  }

  .section-card:hover {
    transform: translateY(-6px);
    box-shadow: 
      0 25px 50px rgba(0,0,0,0.4),
      inset 0 1px 0 rgba(255,255,255,1);
  }

  .section-card h2 {
    margin-top: 0;
    font-size: 1.45rem;
    color: #0F172A;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid rgba(0,0,0,0.06);
    position: relative;
  }

  .link-list {
    list-style: none;
    padding: 0;
    margin: 0;
    display: flex;
    flex-direction: column;
    gap: 14px;
    position: relative;
  }

  .link-list a {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 22px;
    background: #F8FAFC;
    color: #0F172A;
    text-decoration: none;
    border-radius: 12px;
    font-weight: 600;
    font-size: 0.95rem;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    border: 1px solid rgba(0,0,0,0.04);
    box-shadow: 0 2px 6px rgba(0,0,0,0.02);
  }
  
  .link-list a::after {
    content: '→';
    font-size: 1.2rem;
    color: var(--primary);
    opacity: 0;
    transform: translateX(-10px);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .link-list a:hover {
    background: #F0F9FF;
    color: var(--primary-hover);
    border-color: #BAE6FD;
    transform: translateX(8px) scale(1.02);
    box-shadow: 0 6px 16px rgba(4, 136, 202, 0.12);
  }
  
  .link-list a:hover::after {
    opacity: 1;
    transform: translateX(0);
  }

  .empty-state {
    font-size: 0.9rem;
    color: #94A3B8;
    font-style: italic;
    padding: 16px;
    text-align: center;
    background: #F8FAFC;
    border-radius: 12px;
    border: 1px dashed #CBD5E1;
  }

  @media(max-width: 640px) {
    .container { grid-template-columns: 1fr; margin: 40px auto; }
    .portal-header { padding: 16px 24px; }
  }
</style>
</head>
<body>

<div class="bg-accent"></div>

<header class="portal-header">
  <div class="logo-icon">
    <img src="logo.png" alt="SAAE Nova Mutum">
  </div>
  <div class="portal-title">
    <h1>SAAE Nova Mutum</h1>
    <span>Portal do Cliente • Studio Virtually</span>
  </div>
</header>

<main class="container">
  <!-- Coluna de Campanhas -->
  <div class="section-card">
    <h2>🚀 Campanhas Ativas</h2>
    <ul class="link-list">
      <li><a href="campanha-copa-2026/">🏆 Copa do Mundo 2026</a></li>
    </ul>
  </div>

  <!-- Coluna de Planejamentos -->
  <div class="section-card">
    <h2>📋 Planejamentos</h2>
    <ul class="link-list">
      <li><a href="planejamento-maio-2026/">Maio 2026</a></li>
      <!-- Novos planejamentos entram aqui -->
    </ul>
  </div>

  <!-- Coluna de Relatórios -->
  <div class="section-card">
    <h2>📊 Relatórios</h2>
    <ul class="link-list">
      <li><a href="relatorio-abril-2026/">Abril 2026</a></li>
      <li><a href="relatorio-marco-2026/">Março 2026</a></li>
      <!-- Novos relatórios entram aqui -->
    </ul>
  </div>
</main>

</body>
</html>
