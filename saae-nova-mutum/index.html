<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal do Cliente · SAAE Nova Mutum</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Instrument+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --azul: #0488CA;
    --azul-deep: #0369A1;
    --verde: #7CB013;
    --verde-mid: #A7D240;
    --bg: #080F18;
    --bg2: #0D1B2A;
    --bg3: #112233;
    --borda: rgba(4,136,202,0.18);
    --borda2: rgba(255,255,255,0.06);
    --texto: #E8F4FD;
    --texto-mid: #8BAFC8;
    --texto-light: #4D7A9E;
    --syne: 'Syne', sans-serif;
    --sans: 'Instrument Sans', sans-serif;
    --radius: 12px;
  }
  
  body { 
    background-color: var(--bg);
    color: var(--texto); 
    font-family: var(--sans); 
    margin: 0;
    padding: 0;
    overflow-x: hidden;
  }

  /* Efeitos de Fundo (Orbs) do Relatório */
  .hero-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: -1;
  }
  .hero-orb.o1 { width: 600px; height: 600px; background: rgba(4,136,202,0.15); top: -200px; right: -100px; }
  .hero-orb.o2 { width: 400px; height: 400px; background: rgba(124,176,19,0.1); bottom: -100px; left: -100px; }

  .portal-header {
    background: rgba(8, 15, 24, 0.7);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    padding: 24px 40px;
    border-bottom: 1px solid var(--borda);
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo-icon {
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg2);
    border: 1px solid var(--borda2);
    border-radius: 50%;
    padding: 8px;
  }

  .logo-icon img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }

  .portal-title {
    display: flex;
    flex-direction: column;
  }
  .portal-title h1 {
    margin: 0;
    font-size: 20px;
    font-weight: 800;
    font-family: var(--syne);
    color: var(--texto);
    letter-spacing: -0.5px;
  }
  .portal-title span {
    font-size: 11px;
    font-weight: 600;
    color: var(--texto-light);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .container {
    max-width: 920px;
    margin: 60px auto 100px;
    padding: 0 24px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 32px;
  }

  .section-card {
    background: var(--bg2);
    border: 1px solid var(--borda2);
    border-radius: var(--radius);
    padding: 32px;
    transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    position: relative;
    overflow: hidden;
  }
  
  .section-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--azul), var(--verde-mid));
    opacity: 0.5;
    transition: opacity 0.3s;
  }

  .section-card:hover {
    transform: translateY(-4px);
    border-color: var(--borda);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }

  .section-card:hover::before {
    opacity: 1;
  }

  .section-eyebrow {
    display: flex; align-items: center; gap: 10px;
    font-family: var(--syne);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--azul);
    margin-bottom: 24px;
  }
  .section-eyebrow::before {
    content:''; width:20px; height:3px;
    background:var(--azul); border-radius:2px; flex-shrink:0;
  }

  .link-list {
    list-style: none;
    padding: 0;
    margin: 0;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .link-list a {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 22px;
    background: var(--bg3);
    color: var(--texto);
    text-decoration: none;
    border-radius: 8px;
    font-weight: 600;
    font-size: 15px;
    font-family: var(--syne);
    transition: all 0.2s ease;
    border: 1px solid transparent;
  }
  
  .link-list a::after {
    content: '→';
    font-size: 16px;
    color: var(--texto-mid);
    transition: all 0.2s ease;
  }

  .link-list a:hover {
    background: rgba(4, 136, 202, 0.1);
    color: #fff;
    border-color: var(--borda);
    transform: translateX(4px);
  }
  
  .link-list a:hover::after {
    color: var(--azul);
    transform: translateX(4px);
  }

  @media(max-width: 640px) {
    .container { grid-template-columns: 1fr; margin: 40px auto; }
    .portal-header { padding: 16px 24px; }
  }
</style>
</head>
<body>

<div class="hero-orb o1"></div>
<div class="hero-orb o2"></div>

<header class="portal-header">
  <div class="logo-icon">
    <img src="logo.png" alt="SAAE Nova Mutum">
  </div>
  <div class="portal-title">
    <h1>SAAE Nova Mutum</h1>
    <span>Portal do Cliente • Studio Virtually</span>
  </div>
</header>

<main class="container">
  <!-- Coluna de Relatórios -->
  <div class="section-card">
    <div class="section-eyebrow">Acompanhamento</div>
    <ul class="link-list">
      <li><a href="relatorio-maio-2026/">Relatório de Maio 2026</a></li>
      <li><a href="relatorio-abril-2026/">Relatório de Abril 2026</a></li>
      <li><a href="relatorio-marco-2026/">Relatório de Março 2026</a></li>
    </ul>
  </div>

  <!-- Coluna de Planejamentos -->
  <div class="section-card">
    <div class="section-eyebrow">Estratégia</div>
    <ul class="link-list">
      <li><a href="planejamento-maio-2026/">Planejamento Maio 2026</a></li>
    </ul>
  </div>
</main>

</body>
</html>
